<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>照出真身｜照妖鏡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script defer src="main.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="wm-page">
  <!-- 頁首 -->
  <header class="page-hero">
    <div class="page-hero-nav">
      <div class="dropdown">
        <button class="dropbtn" onclick="toggleMenu()" aria-label="展開選單">&#9776;</button>
        <div class="dropdown-content" id="dropdownMenu">
          <a href="watermark.html">施法加印</a>
          <a href="detect.html">破譯真印</a>
        </div>
      </div>
      <h1>照出真身（修復）</h1>
      <a href="index.html" class="mirror-home">回首頁</a>
    </div>
  </header>

  <main class="tool-section container">
    <div class="tool-card">
      <h2>上傳 attack 圖片，系統將取回 Secret 並進行修復</h2>
      <p>
        解碼器會偵測當時嵌入的格數（2×2／3×3／4×4），在通道雜訊與壓縮模擬的條件下，
        輸出 <b>最佳修復版本</b> 與對應資訊。
      </p>

      <div style="display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
        <label for="revealGridHint">我當時嵌入的是：</label>
        <select id="revealGridHint" aria-label="嵌入格數">
          <option value="2">2×2（4 塊）</option>
          <option value="3">3×3（9 塊）</option>
          <option value="4">4×4（16 塊）</option>
        </select>
      </div>

      <div class="action-row">
        <label id="uploadLabel2" for="attackFile" class="upload-as-btn">選擇圖片</label>
        <button id="revealBtn" type="button" class="cta-btn disabled" disabled aria-busy="false">
          執行照出真身
        </button>
      </div>

      <input type="file" id="attackFile" accept="image/*" class="input-file-hidden" aria-label="選擇要照出的圖片">

      <img id="originalImage2" alt="預覽圖" class="image-preview zoomable" style="display:none;" />

      <div id="wmRevealSpinner" class="spinner" role="status" aria-live="polite">處理中…</div>
      <div id="wmRevealResp" class="response" aria-live="polite"></div>
    </div>

    <!-- 結果 -->
    <section id="imageResults2" class="tool-card image-results" style="display:none;" aria-live="polite" aria-label="照出結果">
      <h2 style="margin-top:0;">處理結果</h2>
      <div class="result-row">
        <div class="result-block">
          <p>輸入圖片</p>
          <img id="originalImage2_dup" class="zoomable" style="display:none;" alt="輸入圖片">
        </div>
        <div class="result-block">
          <p>最佳修復</p>
          <img id="imgRevealOnly" class="zoomable" style="display:none;" alt="還原後圖片">
          <div style="margin-top:20px;">
            <a id="downloadBestReveal" href="#" class="cta-btn" style="display:none;">下載修復圖片</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <iframe id="dl_iframe" name="dl_iframe" style="display:none;width:0;height:0;border:0;"></iframe>

  <!-- 上傳提醒 -->
  <div id="noticeModal" class="modal" aria-hidden="true" aria-modal="true" role="dialog" aria-labelledby="noticeTitle" style="display:none;">
    <div class="modal-wrapper">
      <div class="modal-card">
        <button class="close" id="noticeClose" aria-label="關閉">×</button>
        <h3 id="noticeTitle" class="modal-title">提醒：上傳檔案之資料處理</h3>
        <div class="modal-body">
          您上傳的影像可能包含個人資料（例如臉部特徵）。我們僅於本服務中處理用於修復與驗證之目的，
          並依據本站隱私權政策與服務條款辦理。
        </div>
        <div class="modal-actions">
          <button id="noticeContinue" class="cta-btn">繼續</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Zoom Modal -->
  <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-label="圖片放大檢視" style="display:none;">
    <div class="modal-wrapper">
      <div class="modal-card" style="max-width:860px;">
        <button class="close" onclick="closeModal()" aria-label="關閉">×</button>
        <img class="modal-content" id="modalImage" alt="Zoom" style="max-height:75vh;display:block;margin:0 auto;" />
        <div class="zoom-controls" style="display:flex;justify-content:center;gap:10px;margin-top:20px;">
          <button type="button" onclick="zoomIn()" class="cta-btn secondary">＋</button>
          <button type="button" onclick="zoomOut()" class="cta-btn secondary">－</button>
          <button type="button" onclick="resetZoom()" class="cta-btn secondary">原尺寸</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 啟用按鈕 + 預覽圖顯示／清除結果 -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var file = document.getElementById('attackFile');
      var btn  = document.getElementById('revealBtn');
      if (!file || !btn) return;

      file.addEventListener('change', function () {
        var hasFile = file.files && file.files[0];

        // 按鈕啟用 / 停用
        if (hasFile) {
          btn.disabled = false;
          btn.classList.remove('disabled');
        } else {
          btn.disabled = true;
          btn.classList.add('disabled');
        }

        // 預覽圖：選檔就顯示，沒檔就收起來
        var preview = document.getElementById('originalImage2');
        if (hasFile && preview) {
          var reader = new FileReader();
          reader.onload = function (ev) {
            preview.src = ev.target.result;
            preview.style.display = 'block';
          };
          reader.readAsDataURL(file.files[0]);
        } else if (preview) {
          preview.style.display = 'none';
          preview.src = '';
        }

        // 清掉上一次的結果
        var resSec = document.getElementById('imageResults2');
        var inDup  = document.getElementById('originalImage2_dup');
        var outImg = document.getElementById('imgRevealOnly');
        var dlA    = document.getElementById('downloadBestReveal');

        if (resSec) resSec.style.display = 'none';
        if (inDup)  { inDup.src = '';  inDup.style.display  = 'none'; }
        if (outImg) { outImg.src = ''; outImg.style.display = 'none'; }
        if (dlA) {
          dlA.style.display = 'none';
          dlA.removeAttribute('href');
          dlA.removeAttribute('download');
        }
      });

      // 結果圖載入完成後：顯示結果區、收起預覽圖、補上輸入圖
      var resultImg = document.getElementById('imgRevealOnly');
      if (resultImg) {
        resultImg.addEventListener('load', function () {
          if (!resultImg.src) return; // 被清空時不要動作

          var resSec = document.getElementById('imageResults2');
          if (resSec) resSec.style.display = 'block';

          var preview = document.getElementById('originalImage2');
          if (preview) preview.style.display = 'none';

          var inDup = document.getElementById('originalImage2_dup');
          if (inDup && preview && preview.src) {
            inDup.src = preview.src;
            inDup.style.display = 'block';
          }
        });
      }
    });
  </script>

  <!-- 下載邏輯 -->
  <script>
    (function(){
      function apiBase(){
        var host=(location.hostname||"127.0.0.1");
        var proto=(location.protocol==="https:")?"https":"http";
        return (host==="localhost"||host==="127.0.0.1") ? (proto+"://127.0.0.1:5001")
                                                       : (proto+"://"+host+":5001");
      }
      function ensureAbs(url){
        if(!url) return url;
        if(/^https?:\/\//i.test(url) || /^data:/i.test(url)) return url;
        var base=apiBase();
        if(url.startsWith("/")) return base+url;
        if(/^(open|dl|files)\//i.test(url)) return base+"/"+url;
        return url;
      }
      function toDL(url){
        url=ensureAbs(url||"");
        if(!url) return url;
        if(/^data:/i.test(url)) return url;
        var m1=url.match(/\/open\/image\/([^/]+)\/([^/]+\.[a-z0-9]+)$/i);
        if(m1) return apiBase()+"/dl/image/"+encodeURIComponent(m1[1])+"/"+encodeURIComponent(m1[2]);
        var m2=url.match(/\/files\/([^/]+)\/([^/]+\.[a-z0-9]+)$/i);
        if(m2) return apiBase()+"/dl/image/"+encodeURIComponent(m2[1])+"/"+encodeURIComponent(m2[2]);
        return url;
      }
      function getRevealURL(){
        var a=document.getElementById("downloadBestReveal");
        var src=a && a.getAttribute("href");
        if(!src || src==="#"){
          var img=document.getElementById("imgRevealOnly");
          if(img && img.src) src=img.src;
        }
        return src||"";
      }
      function downloadViaIframe(url){
        var f=document.getElementById("dl_iframe");
        if(!f) return;
        var u=url + (url.indexOf("?")>-1?"&":"?") + "t=" + Date.now();
        f.src=u;
      }
      document.addEventListener("click", function(ev){
        var a = ev.target.closest("#downloadBestReveal");
        if(!a) return;
        ev.preventDefault();
        var raw=getRevealURL();
        if(!raw) return;
        var url=toDL(raw);
        if(/^data:/i.test(url)){
          var tmp=document.createElement("a");
          tmp.href=url; tmp.download=a.getAttribute("download")||("reveal_"+Date.now()+".png");
          document.body.appendChild(tmp); tmp.click(); tmp.remove();
          return;
        }
        downloadViaIframe(url);
      }, {capture:true});
    })();
  </script>

  <!-- 上傳前提醒 -->
  <script>
    (function () {
      const fileInput=document.getElementById('attackFile');
      const uploadLbl=document.getElementById('uploadLabel2');
      const modal=document.getElementById('noticeModal');
      const btnOk=document.getElementById('noticeContinue');
      const btnX=document.getElementById('noticeClose');
      if(!fileInput||!modal||!uploadLbl) return;

      const openNotice=()=>{ modal.style.display='block'; modal.setAttribute('aria-hidden','false'); };
      const closeNotice=()=>{ modal.style.display='none';  modal.setAttribute('aria-hidden','true');  };

      uploadLbl.addEventListener('click',e=>{ e.preventDefault(); openNotice(); });
      btnOk&&btnOk.addEventListener('click',()=>{ closeNotice(); setTimeout(()=>fileInput.click(),0); });
      btnX&&btnX.addEventListener('click',closeNotice);
      document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&modal.style.display==='block') closeNotice(); });
    })();
  </script>

  <script>
    // zoom 與 toggleMenu 由 main.js 提供，此處初始化
    document.addEventListener('DOMContentLoaded', function(){
      bindZoomToNewImages();
    });
  </script>
</body>
</html>
